<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Start Page</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #111;
      margin: 0;
    }
    #startBtn {
      font-size: 2em;
      padding: 20px 40px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="startBtn">Enter</button>

  <script>
    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', () => {
      // Open your YouTube video in a new tab
      window.open("https://youtu.be/zTuHbd7YQxc", "_blank");
    });
  </script>
</body>
</html>
